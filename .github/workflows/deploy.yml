name: Deploy to Yandex Cloud Function

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://github.com/yandex-cloud/yccli/releases/latest/download/yc-linux-amd64.tar.gz | tar xz
          sudo mv yc /usr/local/bin/
          yc version

      - name: Deploy to Yandex Cloud Function
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          YC_FUNCTION_ID: ${{ secrets.YC_FUNCTION_ID }}
        run: |
          # Сохраняем ключ сервисного аккаунта
          echo "$YC_SA_JSON_CREDENTIALS" > key.json
          
          # Указываем путь к ключу
          yc config set service-account-key key.json
          yc config set folder-id $(jq -r .folder_id key.json)
          
          # Создаем архив для деплоя
          mkdir deploy-package
          cp index.js deploy-package/
          cp -r dist deploy-package/
          cp -r prisma deploy-package/
          cp package.json deploy-package/
          cp package-lock.json deploy-package/
          cd deploy-package
          npm install --production
          zip -r ../function.zip .
          cd ..
          
          # Деплоим функцию
          yc serverless function version create \
            --function-id $YC_FUNCTION_ID \
            --runtime nodejs-22 \
            --entrypoint index.handler \
            --memory 512m \
            --execution-timeout 10s \
            --source-path ./function.zip